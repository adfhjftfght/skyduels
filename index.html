<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Card & Account Database</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #0a0a0f 0%, #12121a 50%, #0f0f14 100%);
        color: #e8e8ec;
        padding: 2.5rem 1.5rem;
        line-height: 1.6;
    }

    list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        max-width: 480px;
        margin: 0 auto;
        list-style: none;
    }

    li {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 1.25rem 1.5rem;
        font-size: 1.15rem;
        font-weight: 600;
        color: #f4f4f5;
        transition: border-color 0.2s ease, background 0.2s ease;
    }

    li:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(165, 180, 252, 0.25);
    }

    li::before {
        content: "●";
        display: inline-block;
        margin-right: 0.65rem;
        font-size: 0.6rem;
        vertical-align: middle;
        color: #6366f1;
    }

    p1 {
        display: block;
        margin: -0.35rem 0 0.25rem 1.5rem;
        padding: 0 0 0.75rem 0.5rem;
        font-size: 0.9rem;
        font-weight: 400;
        font-style: italic;
        color: #71717a;
        border-left: 2px solid rgba(99, 102, 241, 0.4);
    }
</style>
    </head>
    <body>
        <a href="https://adfhjftfght.github.io/theskyduelshub/" style="display:inline-block;margin:0 auto 1rem;max-width:fit-content;padding:0.9rem 1.2rem;border-radius:999px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;text-decoration:none;font-weight:800;box-shadow:0 8px 24px rgba(99,102,241,0.35);border:2px solid rgba(255,255,255,0.25);">← Back</a>

        <list>
            <li>hok yu</li>
            <p1 id="hokyu-value">loading...</p1>
            <li>miles</li>
            <p1 id="miles-value">loading...</p1>
            <li>rex</li>
            <p1 id="rex-value">loading...</p1>
            <li>caden</li>
            <p1 id="caden-value">loading...</p1>
            <li>franklin</li>
            <p1 id="franklin-value">loading...</p1>
            <li>hugo</li>
            <p1 id="hugo-value">loading...</p1>
            <li>asten</li>
            <p1 id="astin-value">loading...</p1>
            <li>chtim</li>
            <p1 id="chtim-value">loading...</p1>
        </list>
        <p id="load-status" style="max-width:480px;margin:1.5rem auto 0;color:#71717a;font-size:0.85rem;text-align:center;"></p>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
        <script>
            const SUPABASE_URL = "https://jxfmyrgurzoztuxsbyqb.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4Zm15cmd1cnpvenR1eHNieXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDQ5MTMsImV4cCI6MjA5NzcyMDkxM30.GG9Y32NNqNsfEXEah7h2xtVTIgvsJoyi6lWr1WVgvO8";

            const players = ["hokyu", "miles", "rex", "caden", "franklin", "hugo", "astin", "chtim"];
            const loadStatus = document.getElementById("load-status");

            function setAllFailed(message) {
                for (const name of players) {
                    document.getElementById(name + "-value").textContent = "failed to load";
                }
                loadStatus.textContent = message;
                loadStatus.style.color = "#ef4444";
            }

            async function loadPlayers() {
                if (!window.supabase) {
                    setAllFailed("Could not load Supabase library. Check your internet connection.");
                    return;
                }

                const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                try {
                    const { data, error } = await db
                        .from("players")
                        .select(players.join(", "))
                        .limit(1);

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        throw new Error("The players table is empty or blocked by Row Level Security.");
                    }

                    const row = data[0];

                    for (const name of players) {
                        const el = document.getElementById(name + "-value");
                        const value = row[name];
                        el.textContent = value === null || value === undefined ? "—" : value + "$";
                    }

                    loadStatus.textContent = "";
                } catch (error) {
                    console.error("Error fetching players:", error);
                    setAllFailed(error.message || "Failed to load player data.");
                }
            }



            loadPlayers();
        </script>
    </body>
</html>
