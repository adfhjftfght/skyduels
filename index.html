<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Card & Account Database</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #0a0a0f 0%, #12121a 50%, #0f0f14 100%);
        color: #e8e8ec;
        padding: 2.5rem 1.5rem;
        line-height: 1.6;
    }

    list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        max-width: 480px;
        margin: 0 auto;
        list-style: none;
    }

    li {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 1.25rem 1.5rem;
        font-size: 1.15rem;
        font-weight: 600;
        color: #f4f4f5;
        transition: border-color 0.2s ease, background 0.2s ease;
    }

    li:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(165, 180, 252, 0.25);
    }

    li::before {
        content: "●";
        display: inline-block;
        margin-right: 0.65rem;
        font-size: 0.6rem;
        vertical-align: middle;
        color: #6366f1;
    }

    p1 {
        display: block;
        margin: -0.35rem 0 0.25rem 1.5rem;
        padding: 0 0 0.75rem 0.5rem;
        font-size: 0.9rem;
        font-weight: 400;
        font-style: italic;
        color: #71717a;
        border-left: 2px solid rgba(99, 102, 241, 0.4);
    }
</style>
    </head>
    <body>
        <a href="https://adfhjftfght.github.io/theskyduelshub/" style="display:inline-block;margin:0 auto 1rem;max-width:fit-content;padding:0.9rem 1.2rem;border-radius:999px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;text-decoration:none;font-weight:800;box-shadow:0 8px 24px rgba(99,102,241,0.35);border:2px solid rgba(255,255,255,0.25);">← Back</a>
        <div id="account-panel" style="max-width:480px;margin:0 auto 1.5rem;padding:1.5rem;border:1px solid rgba(255,255,255,0.08);border-radius:16px;background:rgba(255,255,255,0.04);">
            <h2 style="font-size:1.3rem;margin-bottom:1rem;color:#c7d2fe;">Create or sign in to your account</h2>
            <label style="display:block;margin-bottom:0.75rem;font-size:0.95rem;color:#dbeafe;">
                Email
                <input id="email-input" type="email" placeholder="you@example.com" style="width:100%;margin-top:0.5rem;padding:0.85rem 1rem;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(15,23,42,0.85);color:#e2e8f0;" />
            </label>
            <label style="display:block;margin-bottom:1rem;font-size:0.95rem;color:#dbeafe;">
                Password
                <input id="password-input" type="password" placeholder="Choose a password" style="width:100%;margin-top:0.5rem;padding:0.85rem 1rem;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(15,23,42,0.85);color:#e2e8f0;" />
            </label>
            <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
                <button id="sign-up-button" style="flex:1;min-width:140px;padding:0.95rem 1rem;border:none;border-radius:12px;background:#6366f1;color:white;font-weight:700;cursor:pointer;">Create account</button>
                <button id="sign-in-button" style="flex:1;min-width:140px;padding:0.95rem 1rem;border:1px solid rgba(255,255,255,0.16);border-radius:12px;background:transparent;color:#e2e8f0;font-weight:700;cursor:pointer;">Sign in</button>
            </div>
            <p id="auth-status" style="margin-top:1rem;font-size:0.9rem;color:#9ca3af;"></p>
        </div>
        <list>
            <li>hok yu</li>
            <p1 id="hokyu-value">loading...</p1>
            <li>miles</li>
            <p1 id="miles-value">loading...</p1>
            <li>rex</li>
            <p1 id="rex-value">loading...</p1>
            <li>caden</li>
            <p1 id="caden-value">loading...</p1>
            <li>franklin</li>
            <p1 id="franklin-value">loading...</p1>
            <li>hugo</li>
            <p1 id="hugo-value">loading...</p1>
            <li>asten</li>
            <p1 id="astin-value">loading...</p1>
            <li>chtim</li>
            <p1 id="chtim-value">loading...</p1>
        </list>
        <p id="load-status" style="max-width:480px;margin:1.5rem auto 0;color:#71717a;font-size:0.85rem;text-align:center;"></p>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
        <script>
            const SUPABASE_URL = "https://jxfmyrgurzoztuxsbyqb.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4Zm15cmd1cnpvenR1eHNieXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDQ5MTMsImV4cCI6MjA5NzcyMDkxM30.GG9Y32NNqNsfEXEah7h2xtVTIgvsJoyi6lWr1WVgvO8";

            const players = ["hokyu", "miles", "rex", "caden", "franklin", "hugo", "astin", "chtim"];
            const loadStatus = document.getElementById("load-status");

            function setAllFailed(message) {
                for (const name of players) {
                    document.getElementById(name + "-value").textContent = "failed to load";
                }
                loadStatus.textContent = message;
                loadStatus.style.color = "#ef4444";
            }

            async function loadPlayers() {
                if (!window.supabase) {
                    setAllFailed("Could not load Supabase library. Check your internet connection.");
                    return;
                }

                const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                try {
                    const { data, error } = await db
                        .from("players")
                        .select(players.join(", "))
                        .limit(1);

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        throw new Error("The players table is empty or blocked by Row Level Security.");
                    }

                    const row = data[0];

                    for (const name of players) {
                        const el = document.getElementById(name + "-value");
                        const value = row[name];
                        el.textContent = value === null || value === undefined ? "—" : value + "$";
                    }

                    loadStatus.textContent = "";
                } catch (error) {
                    console.error("Error fetching players:", error);
                    setAllFailed(error.message || "Failed to load player data.");
                }
            }

            async function signUp(email, password) {
                const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await db.auth.signUp({ email, password });
                if (error) throw error;
                return data;
            }

            async function signIn(email, password) {
                const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;
                return data;
            }

            function setAuthStatus(message, isError = false) {
                const authStatus = document.getElementById("auth-status");
                authStatus.textContent = message;
                authStatus.style.color = isError ? "#ef4444" : "#a3e635";
            }

            document.getElementById("sign-up-button").addEventListener("click", async () => {
                const email = document.getElementById("email-input").value.trim();
                const password = document.getElementById("password-input").value.trim();
                if (!email || !password) {
                    setAuthStatus("Enter both email and password.", true);
                    return;
                }
                try {
                    await signUp(email, password);
                    setAuthStatus("Account created. Check your email for confirmation.");
                } catch (error) {
                    setAuthStatus(error.message || "Sign up failed.", true);
                }
            });

            document.getElementById("sign-in-button").addEventListener("click", async () => {
                const email = document.getElementById("email-input").value.trim();
                const password = document.getElementById("password-input").value.trim();
                if (!email || !password) {
                    setAuthStatus("Enter both email and password.", true);
                    return;
                }
                try {
                    await signIn(email, password);
                    setAuthStatus("Signed in successfully.");
                } catch (error) {
                    setAuthStatus(error.message || "Sign in failed.", true);
                }
            });

            loadPlayers();
        </script>
    </body>
</html>
