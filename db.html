<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Card & Account Database</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #0a0a0f 0%, #12121a 50%, #0f0f14 100%);
        color: #e8e8ec;
        padding: 2.5rem 1.5rem;
        line-height: 1.6;
    }

    list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        max-width: 480px;
        margin: 0 auto;
        list-style: none;
    }

    li {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 1.25rem 1.5rem;
        font-size: 1.15rem;
        font-weight: 600;
        color: #f4f4f5;
        transition: border-color 0.2s ease, background 0.2s ease;
    }

    li:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(165, 180, 252, 0.25);
    }

    li::before {
        content: "●";
        display: inline-block;
        margin-right: 0.65rem;
        font-size: 0.6rem;
        vertical-align: middle;
        color: #6366f1;
    }

    p1 {
        display: block;
        margin: -0.35rem 0 0.25rem 1.5rem;
        padding: 0 0 0.75rem 0.5rem;
        font-size: 0.9rem;
        font-weight: 400;
        font-style: italic;
        color: #71717a;
        border-left: 2px solid rgba(99, 102, 241, 0.4);
    }
</style>
    </head>
    <body>
        <list>
            <li>hok yu</li>
            <p1>27629$</p1>
            <li>miles</li>
            <p1>10000027815$</p1>
            <li>rex</li>
            <p1>12199$</p1>
            <li>caden</li>
            <p1>7645$</p1>
            <li>franklin</li>
            <p1>10000027815$</p1>
            <li>hugo</li>
            <p1>100$</p1>
            <li>asten</li>
            <p1>100$</p1>
            <li>chtim</li>
            <p1>100$</p1>
        </list>
    </body>
</html>
